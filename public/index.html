<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>RC Vehicles Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
    }

    .product h3 {
      margin: 10px 0 5px;
    }

    .product p {
      margin: 5px 0 10px;
      color: #555;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #005fcc;
    }
  </style>
</head>
<body>

  <h1>RC Vehicles – Test Producten</h1>

  <div class="product-grid">

    <div class="product">
      <img src="https://via.placeholder.com/300x160?text=RC+Auto" alt="RC Auto">
      <h3>RC Auto</h3>
      <p>€25,00</p>
      <button onclick="bestellen('RC Auto')">Bestellen</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300x160?text=RC+Boot" alt="RC Boot">
      <h3>RC Boot</h3>
      <p>€40,00</p>
      <button onclick="bestellen('RC Boot')">Bestsellen</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/300x160?text=RC+Drone" alt="RC Drone">
      <h3>RC Drone</h3>
      <p>€60,00</p>
      <button onclick="bestellen('RC Drone')">Bestellen</button>
    </div>

  </div>

  <script>
    async function bestellen(product) {
      await fetch("/bestelling", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ product })
      });

      alert("Bestelling verstuurd!");
    }
  </script>


</body>
</html>
